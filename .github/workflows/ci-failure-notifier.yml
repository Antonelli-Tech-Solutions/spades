name: CI Failure Notifier
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

jobs:
  notify:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      actions: read

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Find associated PR
        id: find-pr
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const runs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${context.payload.workflow_run.head_branch}`
            });
            if (runs.data.length > 0) {
              return runs.data[0].number;
            }
            return null;
          result-encoding: string

      - name: Post @claude comment
        if: steps.find-pr.outputs.result != 'null'
        uses: actions/github-script@v7
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const prNumber = parseInt('${{ steps.find-pr.outputs.result }}');
            const runUrl = '${{ github.event.workflow_run.html_url }}';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `@claude CI failed on this PR. Please check the [workflow run](${runUrl}), diagnose the failure, fix it, and re-run checks.`
            });
