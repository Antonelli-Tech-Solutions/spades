<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spades Online</title>
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #1a3a1a;
        color: #e8e8e8;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }

      #app {
        width: 100%;
        max-width: 420px;
        padding: 1rem;
      }

      .auth-card {
        background: #1e1e1e;
        border: 1px solid #2e2e2e;
        border-radius: 8px;
        padding: 2rem;
      }

      .auth-title {
        font-size: 1.5rem;
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: #fff;
      }

      .form-group {
        margin-bottom: 1rem;
      }

      label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        margin-bottom: 0.25rem;
        color: #b0b0b0;
      }

      input[type="email"],
      input[type="text"],
      input[type="password"] {
        width: 100%;
        padding: 0.625rem 0.75rem;
        background: #2a2a2a;
        border: 1px solid #3a3a3a;
        border-radius: 4px;
        color: #e8e8e8;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.15s;
      }

      input:focus {
        border-color: #4caf50;
      }

      input::placeholder {
        color: #555;
      }

      .form-error {
        min-height: 1.25rem;
        font-size: 0.875rem;
        color: #e57373;
        margin-bottom: 0.75rem;
        margin-top: 0.25rem;
      }

      .btn-primary {
        width: 100%;
        padding: 0.75rem;
        background: #2e7d32;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 0.15s;
      }

      .btn-primary:hover:not(:disabled) {
        background: #388e3c;
      }

      .btn-primary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .auth-link {
        margin-top: 1.25rem;
        font-size: 0.875rem;
        color: #888;
        text-align: center;
      }

      .auth-link a {
        color: #66bb6a;
        text-decoration: none;
      }

      .auth-link a:hover {
        text-decoration: underline;
      }

      .auth-message {
        color: #b0b0b0;
        line-height: 1.6;
        margin-bottom: 1rem;
      }

      .auth-message strong {
        color: #e8e8e8;
      }

      .btn-secondary {
        width: 100%;
        padding: 0.625rem;
        background: transparent;
        color: #66bb6a;
        border: 1px solid #66bb6a;
        border-radius: 4px;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.15s, color 0.15s;
        margin-bottom: 0.75rem;
      }

      .btn-secondary:hover:not(:disabled) {
        background: #66bb6a;
        color: #1a1a1a;
      }

      .btn-secondary:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      .btn-link {
        background: none;
        border: none;
        color: #66bb6a;
        cursor: pointer;
        font-size: inherit;
        padding: 0;
        text-decoration: underline;
      }

      .btn-link:hover {
        color: #81c784;
      }

      .auth-resend {
        margin-bottom: 0.75rem;
      }

      .lobby-actions {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        margin-top: 1.5rem;
      }

      .field-optional {
        font-weight: 400;
        color: #666;
        font-size: 0.8rem;
      }

      /* Join table screen — wider card to accommodate seat grid */
      .join-table-card {
        max-width: 480px;
        margin: 0 auto;
      }

      .join-loading {
        color: #888;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }

      /* Table list */
      .table-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
      }

      .table-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: #252525;
        border: 1px solid #333;
        border-radius: 4px;
        padding: 0.625rem 0.75rem;
        gap: 0.75rem;
      }

      .table-row-info {
        display: flex;
        flex-direction: column;
        gap: 0.15rem;
        min-width: 0;
      }

      .table-row-name {
        font-size: 0.95rem;
        color: #e8e8e8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .table-row-seats {
        font-size: 0.78rem;
        color: #888;
      }

      .table-row .join-seat-btn {
        width: auto;
        flex-shrink: 0;
        padding: 0.4rem 1rem;
        margin-bottom: 0;
        font-size: 0.85rem;
      }

      /* Seat picker grid */
      .seat-grid {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        margin: 1.25rem 0;
      }

      .seat-row-middle {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .seat-center {
        width: 80px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px dashed #444;
        border-radius: 4px;
      }

      .seat-center-label {
        font-size: 0.75rem;
        color: #555;
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }

      .seat-btn {
        width: 90px;
        padding: 0.625rem 0;
        border-radius: 4px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: background 0.15s, color 0.15s;
      }

      .seat-btn--available {
        background: #2e7d32;
        color: #fff;
      }

      .seat-btn--available:hover:not(:disabled) {
        background: #388e3c;
      }

      .seat-btn--taken {
        background: #2a2a2a;
        color: #555;
        cursor: not-allowed;
        border: 1px solid #333;
      }

      .seat-btn:disabled {
        opacity: 0.7;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="src/main.js"></script>
  </body>
</html>
