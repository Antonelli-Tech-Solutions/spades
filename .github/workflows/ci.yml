# .github/workflows/ci.yml
name: CI

on:
  push:
    branches: [qa, main]
  pull_request:
    branches: [dev, qa, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        timeout-minutes: 5
        env:
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
  pass-secret-to-fixer:
    if: failure()
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CI Fixer with secret
        run: |
          gh workflow run claude-ci-fixer.yml \
            -f anthropic_api_key=${{ secrets.ANTHROPIC_API_KEY }}
        env:
          GH_TOKEN: ${{ github.token }}
