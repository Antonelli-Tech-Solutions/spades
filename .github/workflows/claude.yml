name: Claude Code
on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Gate the entire workflow on the sender being in an allowlist of
    # trusted actors. Without this, any GitHub user could open an issue
    # or post a comment containing '@claude' on this public repo and
    # trigger a run that consumes the OAuth token's usage quota.
    #
    # The allowlist includes:
    #   - 'dantonel': the human operator.
    #   - 'claude-bot-dom[bot]': the GitHub App. Kept in the allowlist
    #     so that if/when pr-merged-notifier or similar automations are
    #     re-enabled, their bot-authored '@claude' comments can still
    #     trigger this workflow. Currently those workflows are
    #     .disabled and this entry is harmless.
    #
    # To add or remove trusted actors, edit the fromJSON array below.
    if: |
      contains(fromJSON('["dantonel", "claude-bot-dom[bot]"]'), github.event.sender.login) && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ steps.app-token.outputs.token }}
      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          # anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          allowed_bots: claude-bot-dom
          github_token: ${{ steps.app-token.outputs.token }}
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          assignee_trigger: "dantonel"
          claude_args: '--allowedTools "Bash(gh issue create *),Bash(gh pr create *),Bash(gh pr merge *),Bash(git status),Bash(git log *),Bash(gh issue close *),Bash(gh issue comment *),Bash(gh issue list *),Bash(gh issue edit *),Bash(gh label *),Bash(npm install)"'
          base_branch: dev
          additional_permissions: |
            actions: read
####################
# Moved to CLAUDE.md
####################
